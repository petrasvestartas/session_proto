syntax = "proto3";

package session_proto;

// CrossFeature: plane-to-face cross joint between plate elements.
// Geometry lives in Session::lookup as Polylines, referenced by GUID.
message CrossFeature {
  string guid = 1;
  int32 face_ids_a_first = 2;
  int32 face_ids_a_second = 3;
  int32 face_ids_b_first = 4;
  int32 face_ids_b_second = 5;
  string joint_area_guid = 6;
  repeated string joint_volume_guids = 7;  // size 2
  repeated string joint_line_guids = 8;    // size 2
}

// FaceFeature: face-to-face coplanar joint between two elements.
message FaceFeature {
  string guid = 1;
  int32 face_id_a = 2;
  int32 face_id_b = 3;
  string joint_area_guid = 4;
}

// AxisFeature: closest-polyline / axis-to-axis connection for beam / axis workflows.
message AxisFeature {
  string guid = 1;
  string axis_a_guid = 2;
  string axis_b_guid = 3;
  string connector_guid = 4;
  double distance = 5;
}

// CollisionFeature: BVH / OBB / AABB collision pair.
message CollisionFeature {
  string guid = 1;
  string mode = 2;  // "bvh", "obb", "aabb", ...
}

// EdgeFeature: sum type of everything that can live on a graph edge as a
// structured feature. Absent payload (oneof unset) represents std::monostate
// / None / Empty — no feature attached.
message EdgeFeature {
  oneof payload {
    CrossFeature cross = 1;
    FaceFeature face = 2;
    AxisFeature axis = 3;
    CollisionFeature collision = 4;
  }
}
